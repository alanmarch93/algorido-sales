<style>
        body {
            background-color: #051423;
            color: #d5e4f8;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .presentation-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 40px;
            position: relative;
        }
        .glass-panel {
            background: rgba(22, 27, 34, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(67, 70, 85, 0.3);
            box-shadow: inset 0 1px 0 0 rgba(184, 196, 255, 0.1);
        }
        .ai-glow {
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.2);
        }
        .data-trail {
            background: linear-gradient(90deg, transparent, #00F0FF, transparent);
            height: 1px;
            width: 100%;
            position: absolute;
            opacity: 0.15;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        @keyframes pulse-cyan {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.1); }
        }
        .animate-ai-pulse {
            animation: pulse-cyan 3s infinite ease-in-out;
        }
        .presentation-slide {
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
            z-index: 10;
        }
    </style>

<body class="min-h-screen">
<main class="presentation-container overflow-hidden">
<!-- Background Atmospheric Effects -->

<div class="data-trail top-1/3 animate-[pulse_8s_infinite]"></div>

        </p>
<!-- Centered Major CTA -->

                Deploy Now
                <span class="material-symbols-outlined text-3xl group-hover:translate-x-2 transition-transform">rocket_launch</span>
</button>
<!-- Visual Feedback Elements -->
<div class="relative w-full max-w-2xl h-24 flex items-center justify-center">
<div class="absolute inset-0 flex justify-around items-center opacity-10">

<div class="w-1.5 h-24 bg-secondary-fixed rounded-full animate-pulse" style="animation-delay: 0.5s"></div>

<div class="w-8 h-2 rounded-full bg-primary"></div>
</div>

<script>
    // Subtle parallax mouse movement effect for presentation impact
    document.addEventListener('mousemove', (e) => {
        const slide = document.querySelector('.presentation-slide');
        const x = (window.innerWidth / 2 - e.clientX) / 100;
        const y = (window.innerHeight / 2 - e.clientY) / 100;
        
        slide.style.transform = `translateX(${x}px) translateY(${y}px)`;
    });
</script>
